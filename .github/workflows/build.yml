name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Windows 32-bit — native Win32 (lxn/walk, CGO + mingw) ──────────────────
  build-windows:
    name: Windows 32-bit (native Win32)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.20'

      - name: Install mingw-w64 32-bit
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-mingw-w64-i686

      - name: Build
        env:
          GOOS:        windows
          GOARCH:      386
          CGO_ENABLED: "1"
          CC:          i686-w64-mingw32-gcc
        run: |
          go build \
            -ldflags "-H windowsgui -s -w -X main.version=${GITHUB_REF_NAME}" \
            -o kombi-ccid-win32.exe \
            .

      - uses: actions/upload-artifact@v4
        with:
          name: windows-32bit
          path: kombi-ccid-win32.exe

  # ── GitHub Release ───────────────────────────────────────────────────────────
  release:
    name: Create Release
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/windows-32bit/kombi-ccid-win32.exe
          generate_release_notes: true
